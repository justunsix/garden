allowBuilds:
  esbuild: true
  sharp: true
# Delay the installation of newly published versions (Number of minutes)
# to 12 days
# https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 17280
minimumReleaseAgeExclude:
  - '@astrojs/markdown-satteri@0.3.4'
  - '@astrojs/starlight@0.41.4'
  - astro@7.1.3
resolutionMode: time-based
